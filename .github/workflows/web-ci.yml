name: Web CI

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  ci:
    name: Lint & Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          cache: 'true'
          cache_dependency_path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: web
      - name: Lint
        run: pnpm lint
        working-directory: web
      - name: Type check
        run: pnpm exec tsc --noEmit
        working-directory: web
      - name: Unit tests
        run: pnpm test
        working-directory: web

  vulnerability-check:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          cache: 'true'
          cache_dependency_path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: web
      - name: Vulnerability check
        run: pnpm audit --audit-level=moderate
        working-directory: web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          cache: 'true'
          cache_dependency_path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: web
      - name: Build
        run: pnpm build
        working-directory: web
